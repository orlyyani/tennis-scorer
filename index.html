<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2d5a27">
<title>Tennis Scorer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #2d5a27;
    --white: #f5f0e8;
    --gold: #d4a843;
    --dark: #111;
  }

  html, body { height: 100%; width: 100%; }

  body {
    background: var(--green);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      linear-gradient(transparent 49.5%, rgba(255,255,255,0.06) 49.5%, rgba(255,255,255,0.06) 50.5%, transparent 50.5%),
      linear-gradient(90deg, transparent 49.5%, rgba(255,255,255,0.06) 49.5%, rgba(255,255,255,0.06) 50.5%, transparent 50.5%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.35) 100%);
    pointer-events: none; z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 500px;
    padding: clamp(10px, 3vw, 20px);
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 2vw, 14px);
  }

  /* Header */
  .header { text-align: center; }

  .header h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1.8rem, 7vw, 2.8rem);
    color: var(--white);
    letter-spacing: 4px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    line-height: 1;
  }

  .header h1 span { color: var(--gold); }

  /* Sets board */
  .sets-board {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: clamp(8px, 2vw, 12px);
    padding: clamp(8px, 2vw, 12px) clamp(10px, 3vw, 16px);
    backdrop-filter: blur(8px);
  }

  .sets-label {
    font-size: clamp(0.55rem, 1.8vw, 0.65rem);
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.4); text-align: center;
    margin-bottom: 8px;
  }

  .sets-row {
    display: flex; align-items: center;
    gap: clamp(4px, 1.5vw, 8px);
    justify-content: center; margin-bottom: 4px;
  }

  .player-name-sm {
    font-size: clamp(0.6rem, 2.2vw, 0.75rem);
    font-weight: 500; color: rgba(255,255,255,0.7);
    width: clamp(60px, 18vw, 90px);
    text-align: right; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }

  .player-name-sm.right { text-align: left; }

  .set-boxes { display: flex; gap: clamp(3px, 1vw, 5px); }

  .set-box {
    width: clamp(22px, 6vw, 30px);
    height: clamp(22px, 6vw, 30px);
    border-radius: 5px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    color: rgba(255,255,255,0.3);
    transition: all 0.3s ease;
  }

  .set-box.won {
    background: var(--gold); border-color: var(--gold);
    color: var(--dark); box-shadow: 0 0 10px rgba(212,168,67,0.4);
  }

  .set-box.current {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3); color: var(--white);
  }

  /* Status */
  .status-bar {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: clamp(6px, 2vw, 10px);
    padding: clamp(7px, 2vw, 10px) 16px;
    text-align: center; backdrop-filter: blur(8px);
    min-height: clamp(34px, 9vw, 42px);
    display: flex; align-items: center; justify-content: center;
  }

  .status-text {
    font-size: clamp(0.6rem, 2.2vw, 0.75rem);
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); font-weight: 500; transition: all 0.3s;
  }

  .status-text.normal { color: rgba(255,255,255,0.4); }

  /* Score area */
  .score-area {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: clamp(5px, 1.5vw, 10px);
    align-items: stretch;
  }

  .player-btn {
    background: rgba(0,0,0,0.35);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: clamp(12px, 3.5vw, 18px);
    padding: clamp(14px, 4vw, 24px) clamp(8px, 2.5vw, 14px);
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(6px, 2vw, 10px);
    -webkit-tap-highlight-color: transparent;
    user-select: none; backdrop-filter: blur(8px);
    position: relative; overflow: hidden;
    width: 100%;
    min-height: clamp(160px, 38vw, 260px);
  }

  .player-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.12) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.12s;
  }

  .player-btn:active::before { opacity: 1; }

  .player-btn.serving {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold), 0 4px 20px rgba(212,168,67,0.2);
  }

  .player-btn:active { transform: scale(0.96); background: rgba(0,0,0,0.5); }

  .serve-indicator {
    width: clamp(7px, 2vw, 10px);
    height: clamp(7px, 2vw, 10px);
    border-radius: 50%; background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
    opacity: 0; transition: opacity 0.3s;
  }

  .player-btn.serving .serve-indicator { opacity: 1; }

  .player-label {
    font-size: clamp(0.5rem, 1.6vw, 0.62rem);
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.4); font-weight: 500;
  }

  .player-name {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1rem, 3.5vw, 1.5rem);
    color: var(--white); letter-spacing: 2px;
    text-align: center; line-height: 1; word-break: break-all;
  }

  .point-score {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.8rem, 11vw, 5rem);
    color: var(--white); line-height: 1;
    text-shadow: 0 2px 16px rgba(0,0,0,0.5);
    transition: color 0.2s;
  }

  .point-score.pop { animation: scorePop 0.25s ease; }

  .game-score {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(0.8rem, 2.8vw, 1.1rem);
    color: rgba(255,255,255,0.5); letter-spacing: 2px;
  }

  .tap-hint {
    font-size: clamp(0.48rem, 1.5vw, 0.6rem);
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.18); font-weight: 500;
  }

  /* Center divider */
  .center-divider {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; padding: 6px 0;
    width: clamp(18px, 5vw, 28px);
  }

  .vs-text {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(0.7rem, 2.2vw, 1rem);
    color: rgba(255,255,255,0.2); letter-spacing: 2px;
  }

  .divider-line { width: 1px; flex: 1; background: rgba(255,255,255,0.07); }

  /* Controls */
  .controls { display: flex; gap: clamp(5px, 1.5vw, 8px); justify-content: center; }

  .ctrl-btn {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: clamp(6px, 1.5vw, 8px);
    padding: clamp(7px, 2vw, 10px) clamp(12px, 3.5vw, 20px);
    color: rgba(255,255,255,0.5);
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.58rem, 1.8vw, 0.7rem);
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    flex: 1; max-width: 130px;
  }

  .ctrl-btn:active { background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.9); }
  .ctrl-btn.danger { color: rgba(220,80,80,0.6); border-color: rgba(220,80,80,0.2); }
  .ctrl-btn.danger:active { color: rgba(220,80,80,0.9); background: rgba(220,80,80,0.1); }

  /* Winner overlay */
  .winner-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: clamp(12px, 4vw, 22px);
    opacity: 0; pointer-events: none; transition: opacity 0.5s;
    backdrop-filter: blur(12px); padding: 20px; text-align: center;
  }

  .winner-overlay.show { opacity: 1; pointer-events: all; }

  .winner-trophy { font-size: clamp(3rem, 12vw, 5rem); animation: bounce 1s infinite alternate; }

  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-10px); }
  }

  .winner-label {
    font-size: clamp(0.65rem, 2.2vw, 0.8rem);
    letter-spacing: 6px; text-transform: uppercase;
    color: var(--gold); font-weight: 500;
  }

  .winner-name {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.5rem, 10vw, 4rem);
    color: var(--white); letter-spacing: 4px;
    text-shadow: 0 0 40px rgba(212,168,67,0.5);
  }

  .winner-score {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1rem, 4vw, 1.4rem);
    color: rgba(255,255,255,0.4); letter-spacing: 3px;
  }

  .new-match-btn {
    background: var(--gold); border: none;
    border-radius: clamp(8px, 2.5vw, 12px);
    padding: clamp(11px, 3vw, 15px) clamp(28px, 8vw, 40px);
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.7rem, 2.2vw, 0.85rem);
    font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
    color: var(--dark); cursor: pointer; margin-top: 6px;
    box-shadow: 0 4px 20px rgba(212,168,67,0.4);
    -webkit-tap-highlight-color: transparent;
  }

  .new-match-btn:active { transform: scale(0.97); }

  @keyframes scorePop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* Name modal */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 50;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    backdrop-filter: blur(8px); padding: 16px;
  }

  .modal.show { opacity: 1; pointer-events: all; }

  .modal-box {
    background: #1a2e1a;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: clamp(12px, 3.5vw, 18px);
    padding: clamp(20px, 5vw, 30px) clamp(16px, 4vw, 26px);
    width: 100%; max-width: 340px;
    display: flex; flex-direction: column; gap: 14px;
  }

  .modal-title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1.3rem, 5vw, 1.7rem);
    color: var(--white); letter-spacing: 3px;
  }

  .modal-input {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: clamp(10px, 3vw, 13px) 14px;
    color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.9rem, 3vw, 1rem);
    outline: none; width: 100%; transition: border-color 0.2s;
  }

  .modal-input:focus { border-color: var(--gold); }

  .modal-actions { display: flex; gap: 10px; }

  .modal-btn {
    flex: 1; padding: clamp(9px, 2.5vw, 11px);
    border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.7rem, 2.2vw, 0.8rem);
    font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }

  .modal-btn.confirm { background: var(--gold); color: var(--dark); }
  .modal-btn.cancel  { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }

  /* Landscape on small phones */
  @media (max-height: 500px) and (orientation: landscape) {
    .header h1 { font-size: 1.3rem; }
    .container { gap: 5px; padding: 6px clamp(10px, 4vw, 16px); }
    .sets-board { padding: 5px 10px; }
    .sets-label { margin-bottom: 3px; font-size: 0.5rem; }
    .status-bar { min-height: 26px; padding: 4px 12px; }
    .player-btn { min-height: 100px; padding: 8px 6px; gap: 4px; }
    .point-score { font-size: clamp(1.8rem, 7vw, 2.8rem); }
    .player-name { font-size: clamp(0.8rem, 3vw, 1rem); }
    .game-score { font-size: clamp(0.65rem, 2vw, 0.8rem); }
    .tap-hint { display: none; }
    .ctrl-btn { padding: 5px 8px; font-size: 0.55rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>TENNIS <span>SCORER</span></h1>
  </div>

  <div class="sets-board">
    <div class="sets-label">Sets</div>
    <div class="sets-row">
      <div class="player-name-sm" id="setsName1">Player 1</div>
      <div class="set-boxes" id="setBoxes1"></div>
    </div>
    <div class="sets-row">
      <div class="player-name-sm right" id="setsName2">Player 2</div>
      <div class="set-boxes" id="setBoxes2"></div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-text normal" id="statusText">Tap a player to start scoring</div>
  </div>

  <div class="score-area">
    <button class="player-btn serving" id="btn1" onclick="scorePoint(0)">
      <div class="serve-indicator"></div>
      <div class="player-label">Player 1</div>
      <div class="player-name" id="name1">PLAYER 1</div>
      <div class="point-score" id="pts1">0</div>
      <div class="game-score" id="games1">0 Games</div>
      <div class="tap-hint">Tap to score</div>
    </button>

    <div class="center-divider">
      <div class="divider-line"></div>
      <div class="vs-text">VS</div>
      <div class="divider-line"></div>
    </div>

    <button class="player-btn" id="btn2" onclick="scorePoint(1)">
      <div class="serve-indicator"></div>
      <div class="player-label">Player 2</div>
      <div class="player-name" id="name2">PLAYER 2</div>
      <div class="point-score" id="pts2">0</div>
      <div class="game-score" id="games2">0 Games</div>
      <div class="tap-hint">Tap to score</div>
    </button>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="undoPoint()">↩ Undo</button>
    <button class="ctrl-btn" onclick="openNames()">✎ Names</button>
    <button class="ctrl-btn danger" onclick="confirmReset()">↺ Reset</button>
  </div>
</div>

<!-- Winner overlay -->
<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-trophy">🏆</div>
  <div class="winner-label">Match Winner</div>
  <div class="winner-name" id="winnerName">PLAYER 1</div>
  <div class="winner-score" id="winnerScore"></div>
  <button class="new-match-btn" onclick="resetMatch()">New Match</button>
</div>

<!-- Name modal -->
<div class="modal" id="nameModal">
  <div class="modal-box">
    <div class="modal-title">Edit Names</div>
    <input class="modal-input" id="inputName1" placeholder="Player 1 name" maxlength="12">
    <input class="modal-input" id="inputName2" placeholder="Player 2 name" maxlength="12">
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeNames()">Cancel</button>
      <button class="modal-btn confirm" onclick="saveNames()">Save</button>
    </div>
  </div>
</div>

<script>
  const POINTS = ['0','15','30','40','AD'];
  let state = {
    names: ['Player 1','Player 2'], points:[0,0], games:[0,0],
    sets:[[],[]], currentSet:0, server:0, deuce:false, history:[], matchOver:false
  };

  function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
  function pointLabel(p, deuce){ if(deuce){ return p===4?'AD':'40'; } return POINTS[Math.min(p,4)]; }

  function scorePoint(player){
    if(state.matchOver) return;
    state.history.push(deepClone(state));
    if(state.history.length>50) state.history.shift();
    const opp=1-player;
    if(state.deuce){
      if(state.points[player]===4){ winGame(player); return; }
      if(state.points[opp]===4){ state.points[0]=3; state.points[1]=3; }
      else { state.points[player]=4; state.points[opp]=3; }
    } else {
      state.points[player]++;
      if(state.points[0]>=3&&state.points[1]>=3){ state.deuce=true; state.points[0]=3; state.points[1]=3; }
      else if(state.points[player]>=4){ winGame(player); return; }
    }
    animatePop(player); updateUI();
  }

  function winGame(player){
    state.games[player]++; state.points=[0,0]; state.deuce=false;
    state.server=1-state.server;
    const g0=state.games[0],g1=state.games[1];
    if(g0>=6||g1>=6){ const d=Math.abs(g0-g1); if(d>=2||g0===7||g1===7){ winSet(player); return; } }
    updateUI();
  }

  function winSet(player){
    state.sets[0].push(state.games[0]); state.sets[1].push(state.games[1]);
    state.currentSet++; state.games=[0,0];
    const sw=[
      state.sets[0].filter((_,i)=>state.sets[0][i]>state.sets[1][i]).length,
      state.sets[1].filter((_,i)=>state.sets[1][i]>state.sets[0][i]).length
    ];
    if(sw[player]>=2){ state.matchOver=true; updateUI(); setTimeout(()=>showWinner(player),600); return; }
    updateUI();
  }

  function animatePop(player){
    const el=document.getElementById(`pts${player+1}`);
    el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  }

  function updateUI(){
    const {names,points,games,sets,server,deuce}=state;
    document.getElementById('name1').textContent=names[0].toUpperCase();
    document.getElementById('name2').textContent=names[1].toUpperCase();
    document.getElementById('setsName1').textContent=names[0];
    document.getElementById('setsName2').textContent=names[1];
    document.getElementById('pts1').textContent=pointLabel(points[0],deuce);
    document.getElementById('pts2').textContent=pointLabel(points[1],deuce);
    document.getElementById('games1').textContent=games[0]+(games[0]===1?' Game':' Games');
    document.getElementById('games2').textContent=games[1]+(games[1]===1?' Game':' Games');
    document.getElementById('btn1').classList.toggle('serving',server===0);
    document.getElementById('btn2').classList.toggle('serving',server===1);
    renderSetBoxes(0,sets[0],sets[1]); renderSetBoxes(1,sets[1],sets[0]);
    updateStatus();
  }

  function renderSetBoxes(pIdx,mine,theirs){
    const c=document.getElementById(`setBoxes${pIdx+1}`); c.innerHTML='';
    for(let i=0;i<3;i++){
      const b=document.createElement('div');
      if(i<mine.length){ b.className='set-box '+(mine[i]>theirs[i]?'won':''); b.textContent=mine[i]; }
      else if(i===mine.length){ b.className='set-box current'; b.textContent=state.games[pIdx]||'0'; }
      else { b.className='set-box'; }
      c.appendChild(b);
    }
  }

  function updateStatus(){
    const {deuce,points,games,server,names}=state;
    const el=document.getElementById('statusText');
    let msg='',special=false;
    if(deuce){
      if(points[0]===4){msg=`Advantage ${names[0]}`;special=true;}
      else if(points[1]===4){msg=`Advantage ${names[1]}`;special=true;}
      else{msg='Deuce';special=true;}
    } else if(games[0]===5&&games[1]===5){msg='5-5 — Next two games decide!';special=true;}
    else if((games[0]===6&&games[1]===5)||(games[1]===6&&games[0]===5)){
      msg=`${games[0]>games[1]?names[0]:names[1]} for the set`;special=true;
    } else if(games[0]===0&&games[1]===0&&points[0]===0&&points[1]===0){
      msg=`${names[server]} serves first`;
    } else { msg=`${names[server]} to serve`; }
    el.textContent=msg; el.className='status-text'+(special?'':' normal');
  }

  function showWinner(player){
    document.getElementById('winnerName').textContent=state.names[player].toUpperCase();
    document.getElementById('winnerScore').textContent=state.sets[0].map((_,i)=>`${state.sets[0][i]}-${state.sets[1][i]}`).join('  ');
    document.getElementById('winnerOverlay').classList.add('show');
  }

  function undoPoint(){
    if(!state.history.length) return;
    state=state.history.pop(); updateUI();
    const el=document.getElementById('statusText');
    el.textContent='Point undone'; el.className='status-text';
    setTimeout(updateUI,1200);
  }

  function confirmReset(){ if(confirm('Reset the match?')) resetMatch(); }

  function resetMatch(){
    state={names:state.names,points:[0,0],games:[0,0],sets:[[],[]],currentSet:0,server:0,deuce:false,history:[],matchOver:false};
    document.getElementById('winnerOverlay').classList.remove('show');
    updateUI();
  }

  function openNames(){
    document.getElementById('inputName1').value=state.names[0];
    document.getElementById('inputName2').value=state.names[1];
    document.getElementById('nameModal').classList.add('show');
  }

  function closeNames(){ document.getElementById('nameModal').classList.remove('show'); }

  function saveNames(){
    state.names[0]=document.getElementById('inputName1').value.trim()||'Player 1';
    state.names[1]=document.getElementById('inputName2').value.trim()||'Player 2';
    closeNames(); updateUI();
  }

  updateUI();
</script>
</body>
</html>
